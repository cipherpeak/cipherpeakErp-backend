{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-lg-6">
        <div class="card bg-white border-0 rounded-10 mb-4">
            <div class="card-body p-5 text-center">
                <div class="mb-4">
                    <div class="rounded-circle bg-danger bg-opacity-10 d-inline-flex align-items-center justify-content-center" style="width: 80px; height: 80px;">
                        <span class="material-symbols-outlined text-danger fs-40">warning</span>
                    </div>
                </div>
                
                <h3 class="mb-3">Delete PLU Item</h3>
                <p class="mb-4 text-muted">
                    Are you sure you want to delete the PLU <strong>"{{ object.plu }}"</strong>? 
                    <br>This action cannot be undone.
                </p>

                <form method="post">
                    {% csrf_token %}
                    <div class="d-flex justify-content-center gap-3">
                        <a href="{% url 'plu-list' %}" class="btn btn-secondary text-white px-4">Cancel</a>
                        <button type="submit" class="btn btn-danger text-white px-4">Confirm Delete</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
